name: Claude Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  process:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - run: npm ci

      - name: Create branch
        env:
          PR_TITLE: ${{ github.event.issue.title }}
        id: branch
        run: |
          SLUG=$(echo "$PR_TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
          BRANCH="claude/issue-${{ github.event.issue.number }}-${SLUG}"
          git checkout -b "$BRANCH" 2>/dev/null || git checkout "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            Process GitHub issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Follow the process defined in .github/instructions/claude-issue-processing.md exactly.

            IMPORTANT:
            - The branch has already been created for you. Do NOT run git checkout.
            - Do NOT create a PR. The workflow handles that after you are done.
            - If you changed any source code under src/, run npm run lint, npx tsc --noEmit, and npm test and fix any errors before finishing. Skip these checks if only non-source files were changed.
            - Only commit your changes when all checks pass.

      - name: Push branch
        env:
          GH_TOKEN : ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin "https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git"
          git push -u origin "${{ steps.branch.outputs.name }}"

      - name: Create PR
        env:
          PR_TITLE: ${{ github.event.issue.title }}
        run: |
          gh pr create \
            --title "$PR_TITLE" \
            --body "## Summary
            Closes #${{ github.event.issue.number }}" \
            --base main \
            --head "${{ steps.branch.outputs.name }}" \
          2>/dev/null || echo "PR already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
