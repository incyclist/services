name: Claude Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
  
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  process:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - run: npm ci

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Process GitHub issue #${{ github.event.issue.number }}.

            Title: ${{ github.event.issue.title }}

            Body:
            ${{ github.event.issue.body }}

            Follow the process defined in .github/instructions/claude-issue-processing.md exactly.
